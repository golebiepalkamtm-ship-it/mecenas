<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexMind | SVG 3D Engine</title>
    <meta name="description" content="Ultimate SVG to 3D Extrusion Engine with Awwwards-level aesthetics and performance.">
    <link rel="stylesheet" href="style.css">
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">LEXMIND <span>ENGINE</span></div>
        </header>

        <main>
            <div id="canvas-container"></div>
            
            <div class="ui-overlay">
                <div class="upload-section">
                    <label for="fileInput" class="custom-file-upload">
                        <div class="upload-icon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                <path d="M12 16V8M12 8L9 11M12 8L15 11" stroke-linecap="round" stroke-linejoin="round"/>
                                <path d="M3 15V16C3 18.2091 4.79086 20 7 20H17C19.2091 20 21 18.2091 21 16V15M17 8H17.01M7 8H7.01" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                        <div class="upload-text">
                            <span class="primary">DROP SVG FILE</span>
                            <span class="secondary">OR CLICK TO BROWSE</span>
                        </div>
                    </label>
                    <input type="file" id="fileInput" accept=".svg">
                </div>
            </div>

            <div class="status-indicator">
                <div class="pulse"></div>
                <span>READY FOR INPUT</span>
            </div>
        </main>

        <footer>
            <div class="copyright">© 2026 LEXMIND ADVANCED SYSTEMS</div>
            <div class="tech-stack">THREE.JS / WEBGL 2 / 8K RESOLUTION</div>
        </footer>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
